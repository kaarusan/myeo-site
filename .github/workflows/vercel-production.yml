# Deploy myeo.io (Next.js + public/Cursor) to Vercel on every push to main.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN            — https://vercel.com/account/tokens
#   VERCEL_ORG_ID           — Vercel → Project → Settings → General
#   VERCEL_PROJECT_ID       — same
#   MYEO_SUPABASE_URL       — baked at build into public/Cursor (same as Pages workflow)
#   MYEO_SUPABASE_ANON_KEY
#   MYEO_TURNSTILE_SITE_KEY
#
# Optional (Cloudflare in front of myeo.io — bust stale HTML at the edge):
#   CLOUDFLARE_ZONE_ID      — Zone overview (right column) in Cloudflare dashboard
#   CLOUDFLARE_API_TOKEN    — API Token with Zone → Cache Purge → Purge
#
# If Vercel is already connected to this repo, you may get two production deploys per push;
# disable one of the integrations to avoid duplicates.

name: Deploy Vercel production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build (sync-public + inject + next build)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.MYEO_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.MYEO_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.MYEO_TURNSTILE_SITE_KEY }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Purge Cloudflare cache (optional)
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: node scripts/cloudflare-purge-cache.mjs
