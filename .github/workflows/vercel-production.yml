# Deploy myeo.io (Next.js + public/Cursor) to Vercel on every push to main.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN            — https://vercel.com/account/tokens
#   VERCEL_ORG_ID           — Project Settings → General, or .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID       — same
#   MYEO_SUPABASE_URL       — same as Pages workflow (baked at build into public/Cursor)
#   MYEO_SUPABASE_ANON_KEY
#   MYEO_TURNSTILE_SITE_KEY
#
# If the project is already connected in Vercel → Git, you may get two deploys per push;
# then either disconnect Git in Vercel or remove this workflow.

name: Deploy Vercel production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build (sync-public + inject + next build)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.MYEO_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.MYEO_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.MYEO_TURNSTILE_SITE_KEY }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
