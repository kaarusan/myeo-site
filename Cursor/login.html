<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <base href="/Cursor/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#070A0F" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self';" />
    <title>myeo · Login</title>
    <style>
      :root{
        --bg0:#05060a;
        --bg1:#070916;
        --card:rgba(10, 12, 22, .64);
        --line:rgba(255,255,255,.10);
        --text:rgba(255,255,255,.92);
        --muted:rgba(255,255,255,.62);
        --accent:#b6ffea;
        --danger:#ff6b8a;
      }
      *{box-sizing:border-box}
      body{
        margin:0; min-height:100vh; color:var(--text);
        font:500 15px/1.45 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background:
          radial-gradient(1200px 700px at 20% 10%, rgba(122,162,255,.22), transparent 60%),
          radial-gradient(900px 650px at 80% 40%, rgba(182,255,234,.18), transparent 55%),
          linear-gradient(180deg, var(--bg0), var(--bg1));
        display:grid; place-items:center; padding:22px;
      }
      .card{
        width:min(480px, 100%);
        background:var(--card);
        border:1px solid var(--line);
        border-radius:18px;
        padding:18px;
      }
      .h{font-weight:900; letter-spacing:.08em; text-transform:uppercase; font-family:ui-monospace,Consolas,monospace}
      .sub{color:var(--muted); font-size:12px; margin-top:4px}
      .tabs{display:flex; gap:8px; margin-top:14px}
      .tab,.btn{
        border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.03); color:var(--text);
        border-radius:12px; padding:10px 12px; cursor:pointer; font:inherit;
      }
      .tab.active{border-color:rgba(182,255,234,.35); background:rgba(182,255,234,.08)}
      .row{margin-top:10px}
      label{display:block; font-size:12px; color:rgba(255,255,255,.7); margin-bottom:6px}
      input{
        width:100%; border:1px solid rgba(255,255,255,.12); background:rgba(0,0,0,.18); color:var(--text);
        border-radius:12px; padding:10px 12px; font:inherit;
      }
      .btn.primary{border-color:rgba(182,255,234,.35); background:rgba(182,255,234,.08)}
      .btn.danger{border-color:rgba(255,107,138,.35)}
      .actions{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap}
      .msg{margin-top:10px; color:var(--muted); font-size:13px; min-height:18px}
      .panel{display:none; margin-top:8px}
      .panel.active{display:block}
      .mono{font-family:ui-monospace,Consolas,monospace}
      .secret{margin-top:8px; padding:10px; border:1px dashed rgba(182,255,234,.35); border-radius:12px; font-size:12px}
    </style>
  </head>
  <body>
    <main class="card">
      <div class="h">myeo · auth</div>
      <div class="sub">login + signup + 2fa frontend flow</div>

      <div class="hp" aria-hidden="true" style="position:absolute;left:-10000px;width:1px;height:1px;overflow:hidden;">
        <label for="hp_website">Leave blank</label>
        <input type="text" id="hp_website" name="website" tabindex="-1" autocomplete="off" />
      </div>

      <div class="row" id="turnstileRow" style="display:none;margin-top:12px;">
        <div id="turnstileMount"></div>
      </div>

      <div class="tabs">
        <button class="tab active" id="tabSignIn" type="button">Sign in</button>
        <button class="tab" id="tabSignUp" type="button">Sign up</button>
      </div>

      <section class="panel active" id="panelSignIn">
        <div class="row">
          <label for="inEmail">Email</label>
          <input id="inEmail" type="email" autocomplete="username" />
        </div>
        <div class="row">
          <label for="inPassword">Password</label>
          <input id="inPassword" type="password" autocomplete="current-password" />
        </div>
        <div class="actions">
          <button class="btn primary" id="signInBtn" type="button">Sign in</button>
        </div>
      </section>

      <section class="panel" id="panelSignUp">
        <div class="row">
          <label for="upEmail">Email</label>
          <input id="upEmail" type="email" autocomplete="username" />
        </div>
        <div class="row">
          <label for="upPassword">Password</label>
          <input id="upPassword" type="password" autocomplete="new-password" />
        </div>
        <div class="actions">
          <button class="btn primary" id="signUpBtn" type="button">Create account</button>
        </div>
        <div class="secret" id="secretBox" style="display:none;"></div>
      </section>

      <section class="panel" id="panelTwoFactor">
        <div class="sub">Enter your 6-digit code</div>
        <div class="row">
          <label for="twoFactorCode">2FA code</label>
          <input id="twoFactorCode" type="text" maxlength="6" inputmode="numeric" />
        </div>
        <div class="actions">
          <button class="btn primary" id="verify2faBtn" type="button">Verify</button>
          <button class="btn danger" id="logoutBtn" type="button">Cancel</button>
        </div>
      </section>

      <div class="actions">
        <a class="btn" href="index.html" style="text-decoration:none;">Back to page</a>
      </div>
      <div class="msg" id="msg"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="supabase-config.js"></script>
    <script src="turnstile-runtime.js"></script>
    <script src="supabase-auth.js"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script>
      (function(){
        const qs = new URLSearchParams(location.search);
        const next = qs.get("next") || "customize.html";
        const els = {
          tabSignIn: document.getElementById("tabSignIn"),
          tabSignUp: document.getElementById("tabSignUp"),
          panelSignIn: document.getElementById("panelSignIn"),
          panelSignUp: document.getElementById("panelSignUp"),
          panelTwoFactor: document.getElementById("panelTwoFactor"),
          inEmail: document.getElementById("inEmail"),
          inPassword: document.getElementById("inPassword"),
          upEmail: document.getElementById("upEmail"),
          upPassword: document.getElementById("upPassword"),
          signInBtn: document.getElementById("signInBtn"),
          signUpBtn: document.getElementById("signUpBtn"),
          verify2faBtn: document.getElementById("verify2faBtn"),
          twoFactorCode: document.getElementById("twoFactorCode"),
          logoutBtn: document.getElementById("logoutBtn"),
          msg: document.getElementById("msg"),
          secretBox: document.getElementById("secretBox"),
          hpWebsite: document.getElementById("hp_website"),
          turnstileRow: document.getElementById("turnstileRow"),
          turnstileMount: document.getElementById("turnstileMount")
        };

        let turnstileWidgetId = null;

        function postSecurityEvent(type){
          fetch("/api/security-event", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ type: type })
          }).catch(function () {});
        }

        async function verifyTurnstileToken(token){
          const res = await fetch("/api/verify-turnstile", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: token || "" })
          }).catch(function () { return null; });
          if (!res) return { ok: false, offline: true };
          if (res.status === 404) return { ok: true, skipped: true };
          let data = null;
          try { data = await res.json(); } catch { data = null; }
          if (!res.ok) return { ok: false, data: data };
          return { ok: Boolean(data && data.ok), data: data, skipped: Boolean(data && data.skipped) };
        }

        async function validatePasswordStrength(password){
          const res = await fetch("/api/validate-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: password })
          }).catch(function () { return null; });
          if (!res) {
            return { ok: false, message: "Could not reach server to validate password." };
          }
          if (res.status === 404) {
            return { ok: false, message: "Password checks require the deployed app (Vercel), not static hosting only." };
          }
          let data = null;
          try { data = await res.json(); } catch { data = null; }
          if (res.ok && data && data.ok) return { ok: true };
          return { ok: false, message: "Use 12+ characters with upper, lower, number, and symbol." };
        }

        function getTurnstileResponse(){
          if (!turnstileWidgetId || !window.turnstile) return "";
          try { return window.turnstile.getResponse(turnstileWidgetId) || ""; } catch { return ""; }
        }

        function resetTurnstile(){
          if (turnstileWidgetId && window.turnstile) {
            try { window.turnstile.reset(turnstileWidgetId); } catch {}
          }
        }

        function mountTurnstileIfNeeded(){
          const key = window.MYEO_TURNSTILE_SITE_KEY;
          if (!key || !els.turnstileMount) return;
          els.turnstileRow.style.display = "block";
          function tryRender(){
            if (!window.turnstile || !window.turnstile.render) return false;
            if (turnstileWidgetId) return true;
            turnstileWidgetId = window.turnstile.render(els.turnstileMount, {
              sitekey: key,
              theme: "dark"
            });
            return true;
          }
          if (tryRender()) return;
          let n = 0;
          const t = setInterval(function (){
            n++;
            if (tryRender() || n > 80) clearInterval(t);
          }, 50);
        }
        mountTurnstileIfNeeded();

        function setMsg(t, kind){
          els.msg.textContent = t || "";
          els.msg.style.color = kind === "bad" ? "rgba(255,107,138,.9)" : (kind === "ok" ? "rgba(182,255,234,.9)" : "rgba(255,255,255,.7)");
        }

        function show(panel){
          els.panelSignIn.classList.remove("active");
          els.panelSignUp.classList.remove("active");
          els.panelTwoFactor.classList.remove("active");
          panel.classList.add("active");
        }

        function setTab(active){
          els.tabSignIn.classList.toggle("active", active === "signin");
          els.tabSignUp.classList.toggle("active", active === "signup");
        }

        function goNext(){
          location.replace(next);
        }

        const auth = window.myeoSupabaseAuth;
        const client = auth ? auth.getClient() : null;
        if (!client) {
          setMsg("Configure Supabase first in supabase-config.js", "bad");
          return;
        }

        if (navigator.webdriver === true) {
          setMsg("Automated browsers are not allowed here.", "bad");
          postSecurityEvent("rate_limited_client");
          return;
        }

        const RL = {
          signIn: { key: "myeo_rl_signin_v1", max: 5, windowMs: 10 * 60 * 1000, lockMs: 10 * 60 * 1000 },
          twoFa: { key: "myeo_rl_2fa_v1", max: 6, windowMs: 10 * 60 * 1000, lockMs: 10 * 60 * 1000 },
          signUp: { key: "myeo_rl_signup_v1", max: 5, windowMs: 60 * 60 * 1000, lockMs: 60 * 60 * 1000 }
        };

        function nowMs(){ return Date.now(); }
        function readRl(rule){
          try {
            const raw = localStorage.getItem(rule.key);
            const parsed = raw ? JSON.parse(raw) : null;
            return parsed && typeof parsed === "object" ? parsed : { attempts: [], lockUntil: 0 };
          } catch {
            return { attempts: [], lockUntil: 0 };
          }
        }
        function writeRl(rule, state){
          try { localStorage.setItem(rule.key, JSON.stringify(state)); } catch {}
        }
        function pruneAttempts(attempts, windowMs){
          const cutoff = nowMs() - windowMs;
          return (attempts || []).filter(function (t) { return Number(t) >= cutoff; });
        }
        function checkLock(rule){
          const s = readRl(rule);
          const now = nowMs();
          if (s.lockUntil && now < s.lockUntil) {
            return { blocked: true, retryMs: s.lockUntil - now };
          }
          return { blocked: false, retryMs: 0 };
        }
        function registerFailure(rule){
          const s = readRl(rule);
          s.attempts = pruneAttempts(s.attempts, rule.windowMs);
          s.attempts.push(nowMs());
          if (s.attempts.length >= rule.max) {
            s.lockUntil = nowMs() + rule.lockMs;
            s.attempts = [];
          }
          writeRl(rule, s);
        }
        function clearFailures(rule){
          writeRl(rule, { attempts: [], lockUntil: 0 });
        }
        function formatWait(ms){
          const sec = Math.max(1, Math.ceil(ms / 1000));
          const m = Math.floor(sec / 60);
          const s = sec % 60;
          return m ? (m + "m " + s + "s") : (s + "s");
        }

        els.tabSignIn.addEventListener("click", function(){ setTab("signin"); show(els.panelSignIn); setMsg(""); });
        els.tabSignUp.addEventListener("click", function(){ setTab("signup"); show(els.panelSignUp); setMsg(""); });

        async function hasVerifiedTotp() {
          const list = await client.auth.mfa.listFactors();
          if (list.error) return false;
          return Boolean((list.data && list.data.totp || []).some(function (f) { return f.status === "verified"; }));
        }

        async function maybeRedirectIfReady() {
          const session = await auth.getSession();
          if (!session) return;
          const requires2fa = await hasVerifiedTotp();
          if (!requires2fa) {
            goNext();
            return;
          }
          const ok = await auth.isAuthorizedAal2();
          if (ok) goNext();
        }

        async function verifyExistingFactor(code) {
          const list = await client.auth.mfa.listFactors();
          if (list.error) {
            setMsg(list.error.message || "Could not list MFA factors.", "bad");
            return false;
          }
          const verifiedTotp = (list.data && list.data.totp || []).find(function (f) { return f.status === "verified"; });
          if (!verifiedTotp) {
            setMsg("2FA is not enabled for this account. Enable it in dashboard.", "bad");
            return false;
          }
          const challenge = await client.auth.mfa.challenge({ factorId: verifiedTotp.id });
          if (challenge.error) {
            setMsg(challenge.error.message || "Could not start 2FA challenge.", "bad");
            return false;
          }
          const verify = await client.auth.mfa.verify({
            factorId: verifiedTotp.id,
            challengeId: challenge.data.id,
            code: String(code || "").trim()
          });
          if (verify.error) {
            setMsg(verify.error.message || "Invalid 2FA code.", "bad");
            return false;
          }
          return true;
        }

        async function prepare2faPanel() {
          const list = await client.auth.mfa.listFactors();
          if (list.error) {
            setMsg(list.error.message || "Unable to check 2FA factors.", "bad");
            return;
          }
          const hasVerifiedTotp = (list.data && list.data.totp || []).some(function (f) { return f.status === "verified"; });
          if (!hasVerifiedTotp) {
            setMsg("2FA not enabled yet. Sign in and enable it from dashboard.", "bad");
            goNext();
            return;
          }
          els.secretBox.style.display = "none";
          sessionStorage.removeItem("myeo_pending_factor_id");
          show(els.panelTwoFactor);
        }

        els.signUpBtn.addEventListener("click", async function(){
          const lock = checkLock(RL.signUp);
          if (lock.blocked){
            setMsg("Too many sign-up attempts. Try again in " + formatWait(lock.retryMs) + ".", "bad");
            postSecurityEvent("rate_limited_client");
            return;
          }
          if (els.hpWebsite && els.hpWebsite.value) {
            postSecurityEvent("honeypot_trip");
            setMsg("Something went wrong.", "bad");
            return;
          }
          const email = els.upEmail.value.trim();
          const password = els.upPassword.value;
          const pwOk = await validatePasswordStrength(password);
          if (!pwOk.ok) {
            setMsg(pwOk.message || "Weak password.", "bad");
            return;
          }
          const ts = getTurnstileResponse();
          const tv = await verifyTurnstileToken(ts);
          if (!tv.ok && !tv.skipped) {
            if (tv.offline) setMsg("Network error during verification.", "bad");
            else { setMsg("Human verification failed. Retry.", "bad"); postSecurityEvent("turnstile_failed"); }
            resetTurnstile();
            return;
          }
          const res = await client.auth.signUp({ email: email, password: password });
          if (res.error) {
            registerFailure(RL.signUp);
            postSecurityEvent("signup_failed");
            setMsg(res.error.message || "Sign up failed.", "bad");
            resetTurnstile();
            return;
          }
          clearFailures(RL.signUp);
          setMsg("Account created. Sign in to continue.", "ok");
          setTab("signin");
          show(els.panelSignIn);
          els.inEmail.value = email;
          els.upPassword.value = "";
          resetTurnstile();
        });

        els.signInBtn.addEventListener("click", async function(){
          const lock = checkLock(RL.signIn);
          if (lock.blocked){
            setMsg("Too many login attempts. Try again in " + formatWait(lock.retryMs) + ".", "bad");
            postSecurityEvent("rate_limited_client");
            return;
          }
          if (els.hpWebsite && els.hpWebsite.value) {
            postSecurityEvent("honeypot_trip");
            setMsg("Something went wrong.", "bad");
            return;
          }
          const ts = getTurnstileResponse();
          const tv = await verifyTurnstileToken(ts);
          if (!tv.ok && !tv.skipped) {
            if (tv.offline) setMsg("Network error during verification.", "bad");
            else { setMsg("Human verification failed. Retry.", "bad"); postSecurityEvent("turnstile_failed"); }
            resetTurnstile();
            return;
          }
          const email = els.inEmail.value.trim();
          const password = els.inPassword.value;
          const res = await client.auth.signInWithPassword({ email: email, password: password });
          if (res.error) {
            registerFailure(RL.signIn);
            postSecurityEvent("login_failed");
            setMsg(res.error.message || "Sign in failed.", "bad");
            resetTurnstile();
            return;
          }
          clearFailures(RL.signIn);
          els.inPassword.value = "";
          const requires2fa = await hasVerifiedTotp();
          if (!requires2fa) {
            setMsg("Signed in.", "ok");
            goNext();
            return;
          }
          setMsg("Signed in. Complete 2FA.", "ok");
          await prepare2faPanel();
        });

        els.verify2faBtn.addEventListener("click", async function(){
          const lock = checkLock(RL.twoFa);
          if (lock.blocked){
            setMsg("Too many 2FA attempts. Try again in " + formatWait(lock.retryMs) + ".", "bad");
            return;
          }
          const ok = await verifyExistingFactor(els.twoFactorCode.value);
          if (!ok) {
            registerFailure(RL.twoFa);
            postSecurityEvent("two_factor_failed");
            return;
          }
          clearFailures(RL.twoFa);
          setMsg("2FA verified.", "ok");
          await maybeRedirectIfReady();
        });

        els.logoutBtn.addEventListener("click", async function(){
          await client.auth.signOut();
          sessionStorage.removeItem("myeo_pending_factor_id");
          show(els.panelSignIn);
          setMsg("Signed out.");
        });

        maybeRedirectIfReady();
      })();
    </script>
  </body>
</html>
