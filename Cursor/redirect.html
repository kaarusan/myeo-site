<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#070A0F" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self';" />
    <title>Redirecting…</title>
    <style>
      :root{ color-scheme: dark; }
      body{
        margin:0;
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        background:#070A0F;
        color:rgba(255,255,255,.78);
        font: 550 14px/1.45 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      }
      a{ color:#b6ffea; text-decoration:none; }
    </style>
  </head>
  <body>
    Redirecting…
    <script src="supabase-config.js"></script>
    <script src="biolink-remote.js"></script>
    <script>
      (async function(){
        const CFG_KEY = "myeo_biolink_config_v1";

        function safeJsonParse(s){ try { return JSON.parse(s); } catch { return null; } }

        const qs = new URLSearchParams(location.search);
        const to = qs.get("to") || "";
        const label = (qs.get("label") || "link").slice(0, 80);

        function showStaticMessage(text, href, linkText){
          document.body.replaceChildren();
          const p = document.createElement("p");
          p.textContent = text + " ";
          const a = document.createElement("a");
          a.href = href;
          a.textContent = linkText;
          p.appendChild(a);
          document.body.appendChild(p);
        }

        if (!to){
          showStaticMessage("Missing destination.", "index.html", "Back");
          return;
        }

        function normalizeHttpUrl(raw){
          try {
            var u = new URL(String(raw || "").trim());
            if (u.protocol !== "http:" && u.protocol !== "https:") return null;
            u.hash = "";
            return u.href;
          } catch (e) { return null; }
        }

        async function loadLinksForAllowlist(){
          var c = window.MYEO_SUPABASE;
          if (c && c.url && c.anonKey){
            try{
              var base = String(c.url).replace(/\/$/, "");
              var u = base + "/rest/v1/biolink_public?id=eq.default&select=config";
              var r = await fetch(u, {
                headers: {
                  apikey: c.anonKey,
                  Authorization: "Bearer " + c.anonKey,
                  Accept: "application/json"
                }
              });
              if (r.ok){
                var rows = await r.json();
                var cfgCloud = rows && rows[0] && rows[0].config;
                if (cfgCloud && Array.isArray(cfgCloud.links)) return cfgCloud.links;
              }
            }catch(e){}
          }
          var cfg = null;
          try { cfg = safeJsonParse(localStorage.getItem(CFG_KEY) || "null"); } catch (e) { cfg = null; }
          return Array.isArray(cfg && cfg.links) ? cfg.links : [];
        }

        async function isAllowedTarget(raw){
          var want = normalizeHttpUrl(raw);
          if (!want) return false;
          var links = await loadLinksForAllowlist();
          for (var i = 0; i < links.length; i++) {
            var l = links[i];
            if (!l || !l.url) continue;
            var cand = normalizeHttpUrl(l.url);
            if (cand && cand === want) return true;
          }
          return false;
        }

        if (!(await isAllowedTarget(to))){
          showStaticMessage("Blocked unsafe redirect.", "index.html", "Back");
          return;
        }

        var br = window.myeoBiolinkRemote;
        if (br && br.trackBiolinkRest){
          try{
            await br.trackBiolinkRest("click", label, br.clientLocalDayKey());
          }catch(e){}
        }

        try {
          location.replace(to);
        } catch {
          location.href = to;
        }
      })();
    </script>
  </body>
</html>
